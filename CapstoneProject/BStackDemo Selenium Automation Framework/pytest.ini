# pytest.ini
#
# Pytest configuration file used to customize test execution settings
# for the automation framework.
#
# This file helps define default behavior for pytest runs so that
# tests execute consistently without requiring long command-line arguments.

[pytest]

# addopts defines default command-line options for pytest execution
#
# -v
#   Enables verbose mode so each test case name and status
#   (PASSED / FAILED / SKIPPED) is displayed clearly in the console.
#
# --html=reports/report.html
#   Generates an HTML execution report using pytest-html plugin.
#   The report will be saved in the "reports" folder as report.html.
#   This report contains detailed information about test results.

addopts = -v --html=reports/report.html


# testpaths tells pytest where to look for test files
#
# Instead of scanning the entire project directory,
# pytest will only search inside the "Tests" folder.
# This improves execution speed and keeps the project organized.

testpaths = Tests